<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NewAPI 签到控制台</title>
  <style>
    :root{color-scheme:dark;--bg:#0d1117;--panel:#161b22;--line:#30363d;--text:#e6edf3;--muted:#8b949e;--green:#3fb950;--red:#f85149;--blue:#58a6ff}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font:15px/1.5 system-ui,sans-serif}button,input{font:inherit}.shell{width:min(1120px,calc(100% - 28px));margin:auto;padding:28px 0 56px}header{display:flex;justify-content:space-between;align-items:end;gap:16px}h1,h2,p{margin:0}h1{font-size:clamp(28px,5vw,42px)}h2{font-size:17px}.muted{color:var(--muted)}.eyebrow{color:var(--blue);font-size:12px;letter-spacing:.08em;text-transform:uppercase}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:20px 0}.panel,.stat{background:var(--panel);border:1px solid var(--line);border-radius:10px}.stat,.panel{padding:18px}.stat strong{display:block;font-size:29px}.layout{display:grid;grid-template-columns:1fr 1fr;gap:12px}.panel-head{display:flex;justify-content:space-between;margin-bottom:14px}input{width:100%;padding:10px 12px;margin-top:8px;color:var(--text);background:var(--bg);border:1px solid var(--line);border-radius:8px}button{cursor:pointer;border:0;border-radius:8px;padding:10px 14px;background:var(--blue);color:#07111d;font-weight:700}.ghost{background:transparent;color:var(--text);border:1px solid var(--line)}table{width:100%;border-collapse:collapse}th,td{text-align:left;padding:10px 6px;border-top:1px solid var(--line);vertical-align:top}th{color:var(--muted);font-size:12px}.login{width:min(420px,calc(100% - 28px));margin:14vh auto}.ok{color:var(--green)}.bad{color:var(--red)}.msg{min-height:22px;margin-top:8px}@media(max-width:800px){.grid,.layout{grid-template-columns:1fr}.table-wrap{overflow:auto}table{min-width:520px}header{align-items:start;flex-direction:column}}
  </style>
</head>
<body><main id="app"></main><script>
    const app=document.querySelector('#app'),key='checkin_dashboard_token';
    const token=()=>localStorage.getItem(key);
    const esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    async function api(path,options={}){const response=await fetch(path,{...options,headers:{'content-type':'application/json',...(token()?{authorization:`Bearer ${token()}`}:{})}});const data=await response.json().catch(()=>({}));if(response.status===401){localStorage.removeItem(key);login('登录已过期');throw new Error('登录已过期')}if(!response.ok)throw new Error(data.error||'请求失败');return data}
    function login(message=''){app.innerHTML=`<section class="panel login"><div class="eyebrow">NewAPI Check-in</div><h1>签到控制台</h1><p class="muted">配置账号并查看签到结果，认证信息加密保存在 D1。</p><form id="login" style="margin-top:18px"><input type="password" name="password" placeholder="访问口令" required><button style="width:100%;margin-top:12px">登录</button></form><p class="msg bad">${esc(message)}</p></section>`;document.querySelector('#login').onsubmit=async e=>{e.preventDefault();try{const response=await fetch('/api/auth/login',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({password:new FormData(e.currentTarget).get('password')})});const data=await response.json();if(!response.ok)throw new Error(data.error||'登录失败');localStorage.setItem(key,data.token);dashboard()}catch(error){login(error.message)}}}
    async function dashboard(){app.innerHTML='<div class="shell muted">加载中...</div>';try{const [summary,history]=await Promise.all([api('/api/dashboard/summary'),api('/api/dashboard/runs')]),latest=summary.latest||{},accounts=summary.accounts||[],runs=history.runs||[],rate=latest.total?Math.round(latest.success_count/latest.total*100):0;app.innerHTML=`<div class="shell"><header><div><div class="eyebrow">Worker Console</div><h1>签到控制台</h1><p class="muted">最近运行：${esc(latest.execution_time||'暂无记录')}</p></div><button class="ghost" id="logout">退出</button></header><section class="grid"><div class="stat"><span class="muted">账号</span><strong>${accounts.length}</strong></div><div class="stat"><span class="muted">成功</span><strong class="ok">${latest.success_count??0}</strong></div><div class="stat"><span class="muted">失败</span><strong class="bad">${latest.fail_count??0}</strong></div><div class="stat"><span class="muted">成功率</span><strong>${rate}%</strong></div></section><section class="layout"><article class="panel"><div class="panel-head"><h2>账号配置</h2><span class="muted">AES-GCM 加密</span></div><form id="account"><input name="name" placeholder="备注名称" required><input name="url" placeholder="https://api.example.com" required><input name="session" type="password" placeholder="Session Cookie" required><input name="user_id" placeholder="用户 ID（可选）"><input name="cf_clearance" type="password" placeholder="cf_clearance（可选）"><button style="width:100%;margin-top:10px">添加账号</button></form><p id="msg" class="msg muted"></p><div class="table-wrap"><table><thead><tr><th>账号</th><th>状态</th><th>操作</th></tr></thead><tbody>${accounts.length?accounts.map(a=>`<tr><td><strong>${esc(a.name)}</strong><br><span class="muted">${esc(a.url)}</span><br><span class="muted">${esc(a.last_message||'尚未运行')}</span></td><td class="${a.last_status==='success'?'ok':a.last_status==='failed'?'bad':''}">${a.enabled?(a.last_status==='success'?'正常':a.last_status==='failed'?'失败':'待运行'):'已停用'}</td><td><button class="ghost toggle" data-id="${a.id}" data-enabled="${a.enabled}">${a.enabled?'停用':'启用'}</button></td></tr>`).join(''):'<tr><td colspan="3" class="muted">请先添加账号</td></tr>'}</tbody></table></div></article><article class="panel"><div class="panel-head"><h2>运行历史</h2><span class="muted">最近 30 次</span></div><div class="table-wrap"><table><thead><tr><th>时间</th><th>成功</th><th>失败</th><th>总数</th></tr></thead><tbody>${runs.length?runs.map(r=>`<tr><td>${esc(r.execution_time)}</td><td class="ok">${r.success_count}</td><td class="bad">${r.fail_count}</td><td>${r.total}</td></tr>`).join(''):'<tr><td colspan="4" class="muted">暂无记录</td></tr>'}</tbody></table></div></article></section></div>`;document.querySelector('#logout').onclick=()=>{localStorage.removeItem(key);login()};document.querySelector('#account').onsubmit=async e=>{e.preventDefault();const body=Object.fromEntries(new FormData(e.currentTarget));Object.keys(body).forEach(k=>{if(!body[k])delete body[k]});try{await api('/api/dashboard/accounts',{method:'POST',body:JSON.stringify(body)});dashboard()}catch(error){document.querySelector('#msg').textContent=error.message}};document.querySelectorAll('.toggle').forEach(button=>button.onclick=async()=>{await api(`/api/dashboard/accounts/${button.dataset.id}`,{method:'PATCH',body:JSON.stringify({enabled:button.dataset.enabled!=='true'})});dashboard()})}catch(error){if(error.message!=='登录已过期')app.innerHTML=`<div class="shell bad">${esc(error.message)}</div>`}}
    token()?dashboard():login();
  </script></body>
</html>
